name: Build static nmap for Android (arm64) - Most Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y make wget curl

      - name: Download Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip android-ndk-r25c-linux.zip
          echo "NDK_PATH=${PWD}/android-ndk-r25c" >> $GITHUB_ENV

      - name: Set up NDK environment with target and sysroot
        run: |
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64
          TARGET=aarch64-linux-android
          API=21
          BIN_DIR=$TOOLCHAIN/bin
          SYSROOT=$TOOLCHAIN/sysroot

          echo "$BIN_DIR" >> $GITHUB_PATH

          # 定义编译器（使用 --target 而不是单独指定 -target，以便后续变量传递）
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "API=$API" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV
          echo "CC=$BIN_DIR/clang --target=$TARGET$API --sysroot=$SYSROOT" >> $GITHUB_ENV
          echo "CXX=$BIN_DIR/clang++ --target=$TARGET$API --sysroot=$SYSROOT" >> $GITHUB_ENV
          echo "AR=$BIN_DIR/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$BIN_DIR/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=$BIN_DIR/llvm-strip" >> $GITHUB_ENV

      # --- 获取最新版本号（从官网解析，带后备值）---
      - name: Get latest OpenSSL version
        id: openssl
        run: |
          LATEST=$(curl -s https://www.openssl.org/source/ | grep -oP 'openssl-3\.0\.\d+' | sort -V | tail -n1)
          echo "version=${LATEST#openssl-}" >> $GITHUB_OUTPUT
          echo "url=https://www.openssl.org/source/$LATEST.tar.gz" >> $GITHUB_OUTPUT

      - name: Get latest libpcap version
        id: libpcap
        run: |
          LATEST=$(curl -s https://www.tcpdump.org/release/ | grep -oP 'libpcap-1\.10\.\d+' | sort -V | tail -n1)
          echo "version=${LATEST#libpcap-}" >> $GITHUB_OUTPUT
          echo "url=https://www.tcpdump.org/release/$LATEST.tar.gz" >> $GITHUB_OUTPUT

      - name: Get latest Lua version
        id: lua
        run: |
          LATEST=$(curl -s https://www.lua.org/ftp/ | grep -oP 'lua-5\.4\.\d+' | sort -V | tail -n1)
          echo "version=${LATEST#lua-}" >> $GITHUB_OUTPUT
          echo "url=https://www.lua.org/ftp/$LATEST.tar.gz" >> $GITHUB_OUTPUT

      - name: Get latest nmap version
        id: nmap
        run: |
          LATEST=$(curl -s https://nmap.org/dist/ | grep -oP 'nmap-7\.\d+' | sort -V | tail -n1)
          echo "version=${LATEST#nmap-}" >> $GITHUB_OUTPUT
          echo "url=https://nmap.org/dist/$LATEST.tar.bz2" >> $GITHUB_OUTPUT

      # --- 编译 OpenSSL（完全静态）---
      - name: Build OpenSSL (static)
        run: |
          wget "${{ steps.openssl.outputs.url }}"
          tar xf openssl-*.tar.gz
          cd openssl-*
          # 配置为 Android arm64，只生成静态库
          ./Configure android-arm64 -D__ANDROID_API__=$API --prefix=$PWD/install no-shared
          make -j$(nproc)
          make install_sw
          echo "OPENSSL_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # --- 编译 libpcap（静态）---
      - name: Build libpcap (static)
        run: |
          wget "${{ steps.libpcap.outputs.url }}"
          tar xf libpcap-*.tar.gz
          cd libpcap-*
          ./configure --host=$TARGET --prefix=$PWD/install --disable-shared --enable-static
          make -j$(nproc)
          make install
          echo "LIBPCAP_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # --- 编译 Lua（静态）---
      - name: Build Lua (static)
        run: |
          wget "${{ steps.lua.outputs.url }}"
          tar xf lua-*.tar.gz
          cd lua-*
          # 修改 Makefile 使用交叉编译工具链，并生成静态库
          make clean
          # 直接编译静态库和可执行文件（我们只需要 liblua.a，但编译过程需要 lua 可执行文件？不，我们只需要库）
          # 这里我们只编译 liblua.a，使用交叉编译器
          make CC=$CC AR="$AR rcu" RANLIB=$RANLIB INSTALL_TOP=$PWD/install MYCFLAGS="-fPIE" MYLDFLAGS="-pie" liblua.a
          # 安装头文件和库
          mkdir -p $PWD/install/include $PWD/install/lib
          cp *.h $PWD/install/include/
          cp liblua.a $PWD/install/lib/
          echo "LUA_DIR=$PWD/install" >> $GITHUB_ENV
          cd ..

      # --- 下载并编译 nmap（静态）---
      - name: Download nmap source
        run: |
          wget "${{ steps.nmap.outputs.url }}"
          tar xf nmap-*.tar.bz2
          cd nmap-*
          echo "NMAP_SRC_DIR=$PWD" >> $GITHUB_ENV

      - name: Configure nmap (static)
        run: |
          cd $NMAP_SRC_DIR
          export CPPFLAGS="-I$OPENSSL_DIR/include -I$LIBPCAP_DIR/include -I$LUA_DIR/include"
          export LDFLAGS="-L$OPENSSL_DIR/lib -L$LIBPCAP_DIR/lib -L$LUA_DIR/lib"
          # 预先设置一些交叉编译的缓存变量，避免 configure 测试失败
          export ac_cv_func_malloc_0_nonnull=yes
          export ac_cv_func_realloc_0_nonnull=yes
          export lt_cv_sys_max_cmd_len=32768
          export CFLAGS="-fPIE -O2"
          ./configure \
            --host=$TARGET \
            --build=x86_64-linux-gnu \
            --prefix=$PWD/install \
            --without-zenmap \
            --without-nmap-update \
            --with-pcap=linux \
            --with-openssl=$OPENSSL_DIR \
            --with-liblua=$LUA_DIR \
            --with-libpcap=$LIBPCAP_DIR \
            --enable-static \
            --disable-shared

      - name: Compile nmap (static)
        run: |
          cd $NMAP_SRC_DIR
          # 静态链接，并添加页对齐选项（尽管 nmap 可能不需要，但增加保险）
          # 库顺序很重要：先 lua, pcap, 后 ssl, crypto, m
          make -j$(nproc) LDFLAGS="$LDFLAGS -static -pie -Wl,-z,max-page-size=0x1000 -Wl,-z,common-page-size=0x1000" LIBS="-llua -lpcap -lssl -lcrypto -lm"
          make install

      - name: Strip and package
        run: |
          cd $NMAP_SRC_DIR/install/bin
          $STRIP nmap
          echo "=== Checking linked libraries (should only show system libs) ==="
          readelf -d nmap | grep NEEDED || true
          tar -czf $GITHUB_WORKSPACE/nmap-android-static.tar.gz nmap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nmap-android-static
          path: nmap-android-static.tar.gz
