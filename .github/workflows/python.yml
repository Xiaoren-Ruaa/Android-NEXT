name: Android Python 3.13 Static SSL Build

on:
  workflow_dispatch:

jobs:
  build-android-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Python Source
        uses: actions/checkout@v4
        with:
          repository: 'python/cpython'
          ref: 'v3.13.0'

      - name: 1. Build Host Python (Helper)
        run: |
          ./configure
          make -j$(nproc)
          # 必须生成此文件以供交叉编译使用
          cp python host_python 

      - name: 2. Setup Android NDK Environment
        run: |
          # 使用 GitHub 托管机自带的 NDK 路径
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV
          echo "TOOLCHAIN=$ANDROID_HOME/ndk-bundle/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV
          echo "TARGET=aarch64-linux-android" >> $GITHUB_ENV
          echo "API=29" >> $GITHUB_ENV

      - name: 3. Build Static OpenSSL for Android
        # 必须先有 OpenSSL 静态库，否则 Python 配置会报错
        run: |
          git clone --depth 1 -b openssl-3.0.13 https://github.com/openssl/openssl.git
          cd openssl
          export PATH=$TOOLCHAIN/bin:$PATH
          ./Configure android-arm64 no-shared -D__ANDROID_API__=$API --prefix=$(pwd)/dist
          make -j$(nproc)
          make install_sw
          echo "OPENSSL_DIR=$(pwd)/dist" >> $GITHUB_ENV

      - name: 4. Configure Python with Static SSL
        run: |
          export CC=$TOOLCHAIN/bin/$TARGET$API-clang
          
          # 写入 Setup 文件屏蔽缺失模块
          cat << EOF > Modules/Setup
          _ssl _ssl.c -I${{ env.OPENSSL_DIR }}/include -L${{ env.OPENSSL_DIR }}/lib64 -lssl -lcrypto
          _hashlib _hashopenssl.c -I${{ env.OPENSSL_DIR }}/include -L${{ env.OPENSSL_DIR }}/lib64 -lssl -lcrypto
          *disabled*
          _lzma _bz2 _readline _sqlite3 _tkinter
          EOF

          ./configure --host=$TARGET --build=x86_64-linux-gnu \
            --prefix=/data/local/tmp/python \
            --with-build-python=$(pwd)/host_python \
            --disable-shared --without-ensurepip \
            --with-openssl=${{ env.OPENSSL_DIR }} \
            ac_cv_file__dev_ptmx=yes ac_cv_file__dev_ptc=no

      - name: 5. Final Compilation
        run: |
          make -j$(nproc)
          make install DESTDIR=$(pwd)/output

      - name: Upload Python Binary
        uses: actions/upload-artifact@v4
        with:
          name: python-3.13-android-binary
          path: output/data/local/tmp/python/bin/python3.13
