name: Build All Four Core Libs (Full Fix v7)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          # --- 1. 创建兼容性补丁头文件 (解决图 3454, 3456, 3457) ---
          cat <<EOF > android_compat.h
          #ifndef ANDROID_COMPAT_H
          #define ANDROID_COMPAT_H
          #include <string.h>
          #include <stdlib.h>

          // 修复 strverscmp 缺失
          static inline int strverscmp(const char *s1, const char *s2) {
              return strcmp(s1, s2);
          }

          // 修复 Shell 相关存根，使用 static inline 避免冲突
          static inline void setusershell(void) {}
          static inline void endusershell(void) {}
          static inline char *getusershell(void) { return NULL; }

          // 修复 versionsort 映射
          #define versionsort alphasort
          #endif
          EOF

          # --- 2. 修改配置参数，强制注入补丁 ---
          # 通过 CFLAGS 注入头文件，解决符号缺失
          export CFLAGS="-include $(pwd)/android_compat.h -Wno-implicit-function-declaration"
          # 强制链接参数，确保库文件在 /system/lib64 下能找到
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64 -Wl,--allow-shlib-undefined"

          # --- 3. 针对 libmount 监控功能的特殊处理 ---
          echo "int mnt_monitor_enable_fanotify(void *mn, int enable) { return -1; }" > libmount/src/monitor_fanotify.c
          echo "int mnt_monitor_get_fanotify_fd(void *mn) { return -1; }" >> libmount/src/monitor_fanotify.c

          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --disable-bash-completion \
                      --without-python \
                      --without-udev \
                      --without-ncurses \
                      --disable-libmount-mountfd-support \
                      --disable-monitor-fanotify

          make -j$(nproc)

          # --- 4. 提取与重构产物 ---
          mkdir -p output/lib64
          for lib in uuid blkid mount smartcols; do
            cp -d .libs/lib${lib}.so* output/lib64/
          done
          
          # 提取新编译的 lsblk，它将依赖这些新库
          cp .libs/lsblk output/
          
          # 自动补全 .so.1 软链接，这是 Android 运行必需的
          cd output/lib64
          for f in *.so; do 
            if [ ! -L "${f}.1" ]; then ln -sf "$f" "${f}.1"; fi
          done
          cd ../..

          # 瘦身
          $STRIP output/lsblk
          $STRIP output/lib64/*.so* || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: util-linux-libs-ultimate-fix
          path: output/
