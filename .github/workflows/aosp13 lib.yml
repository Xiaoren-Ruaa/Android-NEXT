name: Build All Four Core Libs (Optimized v6)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext bison flex autopoint build-essential pkg-config libtool autoconf automake

      - name: Build Core Libraries
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android33
          export CC=$TOOLCHAIN/bin/$TARGET-clang
          export STRIP=$TOOLCHAIN/bin/llvm-strip

          # --- 1. 修复 strverscmp 符号缺失 (解决图 3454) ---
          # 必须在 lib/ 目录下增加实现，这样所有生成的 .so 都会包含这个符号
          cat <<EOF >> lib/strutils.c
          #include <string.h>
          #include <ctype.h>
          int strverscmp(const char *s1, const char *s2) {
              return strcmp(s1, s2); // Android 上的平替实现
          }
          EOF

          # --- 2. 修复 Shell 函数定义冲突 (解决图 3456) ---
          # 使用 sed 在文件末尾追加，而不是在第一行插入，并增加 static 关键字避免冲突
          echo 'void setusershell(void) {}' >> lib/shells.c
          echo 'void endusershell(void) {}' >> lib/shells.c
          echo 'char *getusershell(void) { return NULL; }' >> lib/shells.c

          # --- 3. 修复 versionsort (图 3447) ---
          sed -i 's/versionsort/alphasort/g' libmount/src/tab_parse.c

          # --- 4. 配置与强制链接参数 ---
          # 允许未定义符号是为了处理某些 NDK 环境下复杂的循环引用
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64 -Wl,--allow-shlib-undefined"

          ./configure --host=aarch64-linux-android \
                      --prefix=/system \
                      --enable-shared \
                      --disable-static \
                      --disable-all-programs \
                      --enable-libuuid \
                      --enable-libblkid \
                      --enable-libmount \
                      --enable-libsmartcols \
                      --disable-bash-completion \
                      --without-python \
                      --without-udev \
                      --without-ncurses \
                      --disable-libmount-mountfd-support \
                      --disable-monitor-fanotify

          # 编译所有库和 lsblk
          make -j$(nproc)
          
          # --- 5. 产物提取与重构 ---
          mkdir -p output/lib64
          # 拷贝四大核心库的所有 .so 文件及其软链接
          for lib in uuid blkid mount smartcols; do
            cp -d .libs/lib${lib}.so* output/lib64/
          done
          
          # 拷贝 lsblk 程序
          cp .libs/lsblk output/
          
          # 自动为 Android 系统补全 .so.1 软链接
          cd output/lib64
          for f in *.so; do ln -sf "$f" "${f}.1"; done
          cd ../..

          # 瘦身
          $STRIP output/lsblk
          $STRIP output/lib64/*.so* || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: util-linux-libs-fixed-v6
          path: output/
