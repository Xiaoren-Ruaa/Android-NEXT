name: Build Ultimate Static fstrim

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # 安装 musl 交叉编译器
          sudo apt-get install -y musl-tools musl-dev gcc-aarch64-linux-gnu autoconf automake libtool pkg-config bison flex

      - name: Build
        run: |
          ./autogen.sh
          
          # 使用 musl-gcc 进行静态编译
          # 它会强制使用 musl 代替 glibc，避开 android 兼容性地雷
          export CC=aarch64-linux-musl-gcc
          
          # 配置阶段，禁用动态库
          ./configure --host=aarch64-linux-gnu \
                      --disable-shared \
                      --enable-static \
                      --disable-all-programs \
                      --enable-fstrim \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-cap-ng

          # 强制链接参数：-static 指示编译器进行静态链接
          # 确保所有的 library 都被嵌入二进制
          make LDFLAGS="-static -static-libgcc"
          
          # 验证：如果这里报错或者有输出依赖，说明还没成功
          # 如果没有任何输出，则说明是真正干净的静态文件
          ! readelf -d fstrim | grep -q "NEEDED"
          
          aarch64-linux-gnu-strip --strip-all fstrim

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-android-aarch64
          path: fstrim
