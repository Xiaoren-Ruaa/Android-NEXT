name: Build Ultimate Static fstrim

on:
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Critical Tools
        run: |
          sudo apt-get update
          # 核心修复：必须安装 libc6-dev-arm64-cross 才能让交叉编译器工作
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
                                 libc6-dev-arm64-cross \
                                 autoconf automake libtool pkg-config gettext autopoint bison flex

      - name: Build
        run: |
          ./autogen.sh
          # 强制指定交叉编译变量
          export CC=aarch64-linux-gnu-gcc
          export STRIP=aarch64-linux-gnu-strip
          
          # 开启极致静态链接：-static-libgcc 确保 C 运行时也打进去
          ./configure --host=aarch64-linux-gnu \
                      LDFLAGS="-static -static-libgcc -Wl,--gc-sections" \
                      --enable-static \
                      --disable-shared \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-ncurses \
                      --without-python \
                      --without-systemd \
                      --without-udev
          
          make -j$(nproc) fstrim
          
          # 极致瘦身
          $STRIP --strip-all fstrim

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-android-aarch64
          path: fstrim
