name: Build Ultimate Static fstrim

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 修复 Image 3 的关键：增加 autopoint 和 gettext
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex wget tar file xz-utils build-essential gettext autopoint

      - name: Setup Bootlin Toolchain
        run: |
          # 解决 Image 2 的连接超时：换用 Bootlin 官方稳定源
          wget https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2024.05-1.tar.xz
          tar -xf aarch64--musl--stable-2024.05-1.tar.xz
          echo "$(pwd)/aarch64--musl--stable-2024.05-1/bin" >> $GITHUB_PATH

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          # 解决 Image 1 的 Exit 77：使用温和但有效的静态参数
          export CC="aarch64-linux-gcc"
          export CFLAGS="-Os -static"
          export LDFLAGS="-static"
          
          ./configure --host=aarch64-linux \
                      --disable-shared \
                      --enable-static \
                      --disable-all-programs \
                      --enable-fstrim \
                      --enable-libmount \
                      --enable-libblkid \
                      --enable-libuuid \
                      --without-python \
                      --without-systemd \
                      --without-udev \
                      --without-ncurses \
                      --without-cap-ng \
                      --disable-nls \
                      --disable-bash-completion
          
          make fstrim LDFLAGS="-static"
          aarch64-linux-strip --strip-all fstrim
          
          echo "Verification:"
          file fstrim

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fstrim-static-aarch64
          path: fstrim
