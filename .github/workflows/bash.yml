name: Build Static Bash for ARM64

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Bash (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v3

      - name: Build static Bash inside ARM64 container
        run: |
          bash scripts/packages/build-bash-static.sh manifests/bash.env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bash-static-arm64
          path: |
            dist/bash/bash
            dist/bash/VERSION
          retention-days: 90
