name: Build lsof (ARM64 Static)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build lsof (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static lsof inside ARM64 Alpine container
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/lsof-org/lsof/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Latest lsof version: ${LATEST_VERSION}"

          docker run --rm --platform linux/arm64 -v $(pwd):/workspace -w /workspace alpine:3.21 sh -c '
            # Alpine 仓库更新与必要工具安装
            apk update && \
            apk add wget build-base file libtirpc-dev musl-obstack-dev && \

            # 下载源码
            wget https://github.com/lsof-org/lsof/archive/refs/tags/'"${LATEST_VERSION}"'.tar.gz && \
            tar xzf '"${LATEST_VERSION}"'.tar.gz && \
            cd lsof-'"${LATEST_VERSION}"' && \

            # 配置 (Alpine 下直接使用 linux 目标)
            ./Configure -n linux && \

            # 修改 Makefile 强制全静态链接，并显式链接 obstack 库
            sed -i "s/^LDFLAGS =$/LDFLAGS = -static -all-static -lobstack/" Makefile && \
            sed -i "s/^CFLAGS =/CFLAGS = -static/" Makefile && \

            # 编译
            make -j$(nproc) CC="gcc -static" && \

            # 验证
            file ./lsof | grep "statically linked" || { echo "Error: not static"; exit 1; } && \

            # 复制到挂载目录
            cp ./lsof /workspace/
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsof-static-arm64
          path: ./lsof
          retention-days: 90
