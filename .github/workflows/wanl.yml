name: Build RTL8812AU Final Protocol

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu bc build-essential libelf-dev libssl-dev flex bison

      - name: Fetch Kernel Source & Driver
        run: |
          git clone --depth 1 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475.git kernel
          git clone --depth 1 https://github.com/aircrack-ng/rtl8812au.git driver

      - name: Path & Type Forgery (Double Strike)
        run: |
          # 1. 维持环境欺骗 (白名单修复)
          FAKE_PATH="/work/personal_build_pvc/1c4214df-492a-4e08-94ab-cd8066d8e2f0/basepvc-dis-jenkins-10.27.103.189kuqrXsvd/workspace/Personal_Debug_Release/personal_version_build_poject/code/source/vnd/kernel_platform/out/gki_kernel/common"
          sudo mkdir -p "$FAKE_PATH"
          sudo touch "$FAKE_PATH/abi_symbollist.raw"
          sudo chmod -R 777 /work/

          cd kernel
          # 2. 核心大杀器：创建一个强制包含的补丁文件
          # 这样可以完美解决 atomic64_t 和 atomic_t 的成员报错
          echo -e '#ifndef __PATCH_H__\n#define __PATCH_H__\ntypedef struct { int counter; } atomic_t;\ntypedef struct { long counter; } atomic64_t;\n#endif' > include/linux/force_patch.h

          # 3. 修复 Kconfig
          grep -rE "source \".*\"" . | while read -r line; do
              file_path=$(echo "$line" | cut -d: -f1)
              target_ref=$(echo "$line" | sed -E 's/.*source "(.*)"/\1/')
              if [ ! -f "$target_ref" ]; then
                  sed -i "\|source \"$target_ref\"|d" "$file_path"
              fi
          done

          # 4. 锁定版本与架构，并修改 Makefile 强制包含我们的补丁
          sed -i '2iARCH := arm64\nSUBLEVEL := 117' Makefile
          sed -i '/^KBUILD_CFLAGS/ s/$/ -include $(srctree)\/include\/linux\/force_patch.h/' Makefile

          cp ../config .config
          # 强制关闭干扰项
          sed -i 's/CONFIG_UNUSED_KSYMS_WHITELIST=.*/CONFIG_UNUSED_KSYMS_WHITELIST=""/' .config
          sed -i 's/CONFIG_ABI_WHITELIST=.*/# CONFIG_ABI_WHITELIST is not set/' .config
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Final Prepare
        run: |
          cd kernel
          # 这一次编译器在跑 bounds.c 之前会强制加载 force_patch.h
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-w" prepare0 -j$(nproc)

      - name: Build Driver Module
        run: |
          cd driver
          # 驱动编译阶段
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               KSRC=$GITHUB_WORKSPACE/kernel \
               KCFLAGS="-w -include $GITHUB_WORKSPACE/kernel/include/linux/force_patch.h" \
               USER_MODULE_NAME=8812au -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8812au-ko-Final
          path: driver/8812au.ko
