name: Build RTL8812AU Final Shield

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu bc build-essential libelf-dev libssl-dev flex bison

      - name: Fetch Source
        run: |
          git clone --depth 1 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475.git kernel
          git clone --depth 1 https://github.com/aircrack-ng/rtl8812au.git driver

      - name: Nuclear Clean & Precision Patch
        run: |
          # 1. 强制建立厂商白名单路径（解决 autoksyms 报错）
          FAKE_PATH="/work/personal_build_pvc/1c4214df-492a-4e08-94ab-cd8066d8e2f0/basepvc-dis-jenkins-10.27.103.189kuqrXsvd/workspace/Personal_Debug_Release/personal_version_build_poject/code/source/vnd/kernel_platform/out/gki_kernel/common"
          sudo mkdir -p "$FAKE_PATH"
          sudo touch "$FAKE_PATH/abi_symbollist.raw"

          cd kernel
          # 2. 精准移除导致 Kconfig 崩溃的厂商死链接 (解决 1000004102)
          sed -i 's/^source "kernel\/oplus_perf_sched\/Kconfig"/# source "kernel\/oplus_perf_sched\/Kconfig"/' init/Kconfig

          # 3. 创建强制补丁头文件 (解决 atomic 相关所有报错)
          # 使用 force_type 避开类型重复定义冲突
          cat <<EOF > include/linux/final_fix.h
          #ifndef __FINAL_FIX_H__
          #define __FINAL_FIX_H__
          #include <linux/types.h>
          typedef struct { int counter; } atomic_t_force;
          typedef struct { long counter; } atomic64_t_force;
          #define atomic_t atomic_t_force
          #define atomic64_t atomic64_t_force
          #define ATOMIC_INIT(i) { (i) }
          #endif
          EOF

          # 4. 配置初始化 (加入 || true 保证不因为厂商的小警告而中断)
          cp ../config .config
          sed -i 's/CONFIG_UNUSED_KSYMS_WHITELIST=.*/CONFIG_UNUSED_KSYMS_WHITELIST=""/' .config
          sed -i 's/CONFIG_ABI_WHITELIST=.*/# CONFIG_ABI_WHITELIST is not set/' .config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig || true

      - name: Manual Minimal Prepare
        run: |
          cd kernel
          # 仅生成编译外部模块最核心的文件，绝不跑厂商的自检脚本
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-w -include $(pwd)/include/linux/final_fix.h" include/generated/bounds.h -j$(nproc)
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-w -include $(pwd)/include/linux/final_fix.h" include/generated/uapi/linux/version.h
          
          # 手动补齐架构头文件软链接
          mkdir -p include/asm
          cp -r arch/arm64/include/asm/* include/asm/ || true

      - name: Build Driver Module
        run: |
          cd driver
          # 驱动编译阶段：强行包含补丁，忽略所有警告
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               KSRC=$GITHUB_WORKSPACE/kernel \
               KCFLAGS="-w -fpermissive -include $GITHUB_WORKSPACE/kernel/include/linux/final_fix.h" \
               USER_MODULE_NAME=8812au -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8812au-driver-SUCCESS
          path: driver/*.ko
