name: Build RTL8812AU Final Victory

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu bc build-essential libelf-dev libssl-dev flex bison

      - name: Fetch Kernel Source & Driver
        run: |
          git clone --depth 1 https://github.com/OnePlusOSS/android_kernel_oneplus_sm8475.git kernel
          git clone --depth 1 https://github.com/aircrack-ng/rtl8812au.git driver

      - name: Deep Environment Forgery
        run: |
          # 核心修复：根据截图 1000004091 的报错，伪造绝对路径
          # 我们直接把那个报错找不到的文件，软链接到我们的空文件上
          sudo mkdir -p /work/personal_build_pvc/1c4214df-492a-4e08-94ab-cd8066d8e2f0/basepvc-dis-jenkins-10.27.103.189kuqrXsvd/workspace/Personal_Debug_Release/personal_version_build_poject/code/source/vnd/kernel_platform/out/gki_kernel/common/
          sudo touch /work/personal_build_pvc/1c4214df-492a-4e08-94ab-cd8066d8e2f0/basepvc-dis-jenkins-10.27.103.189kuqrXsvd/workspace/Personal_Debug_Release/personal_version_build_poject/code/source/vnd/kernel_platform/out/gki_kernel/common/abi_symbollist.raw
          sudo chmod -R 777 /work/

      - name: Kernel Surgery
        run: |
          cd kernel
          # 1. 修复 Kconfig
          grep -rE "source \".*\"" . | while read -r line; do
              file_path=$(echo "$line" | cut -d: -f1)
              target_ref=$(echo "$line" | sed -E 's/.*source "(.*)"/\1/')
              if [ ! -f "$target_ref" ]; then
                  sed -i "\|source \"$target_ref\"|d" "$file_path"
              fi
          done

          # 2. 锁定架构与原子定义（保持之前成功的逻辑）
          sed -i '2iARCH := arm64\nSUBLEVEL := 117' Makefile
          echo -e "typedef struct { long counter; } atomic64_t;\ntypedef struct { int counter; } atomic_t;" >> include/linux/types.h
          
          # 3. 配置对齐并强制关闭所有白名单校验开关
          cp ../config .config
          sed -i 's/CONFIG_UNUSED_KSYMS_WHITELIST=.*/CONFIG_UNUSED_KSYMS_WHITELIST=""/' .config
          sed -i 's/CONFIG_ABI_WHITELIST=.*/# CONFIG_ABI_WHITELIST is not set/' .config
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig

      - name: Final Prepare
        run: |
          cd kernel
          # 这一次无论它怎么找，/work/ 下都有对应的文件了
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-w" prepare0 -j$(nproc)

      - name: Build Driver Module
        run: |
          cd driver
          # 最终的驱动编译
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
               KSRC=$GITHUB_WORKSPACE/kernel \
               KCFLAGS="-w" USER_MODULE_NAME=8812au -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8812au-ko-FINAL
          path: driver/8812au.ko
