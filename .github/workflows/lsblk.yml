name: Build NDK-Native lsblk (Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout util-linux
        uses: actions/checkout@v4
        with:
          repository: util-linux/util-linux
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config bison flex gettext autopoint

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Fix NDK Compatibility
        run: |
          # 针对截图 3446 中的错误，手动注入缺少的 shell 处理函数定义
          # 这样可以欺骗编译器，避免 "undeclared function" 错误
          sed -i '1i #define getusershell() (NULL)\n#define endusershell() ((void)0)' lib/shells.c

      - name: Configure and Build
        run: |
          ./autogen.sh
          
          export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export TARGET=aarch64-linux-android
          export API=29 # 建议使用 29 以获得更好的兼容性
          
          export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
          # 增加忽略警告的参数，防止因 Bionic 的细微差异导致编译中断
          export CFLAGS="-Wno-implicit-function-declaration -Wno-int-conversion"
          export LDFLAGS="-Wl,-rpath=/system/lib64 -Wl,--dynamic-linker=/system/bin/linker64"

          ./configure \
            --host=$TARGET \
            --disable-all-programs \
            --enable-lsblk \
            --enable-libblkid \
            --enable-libmount \
            --enable-libsmartcols \
            --enable-shared \
            --disable-static \
            --without-udev \
            --without-ncurses \
            --without-python \
            --disable-bash-completion \
            --disable-nls

          make lsblk -j$(nproc)
          
          # 提取并重命名
          cp .libs/lsblk lsblk
          $TOOLCHAIN/bin/llvm-strip lsblk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsblk-ndk-fixed
          path: lsblk
