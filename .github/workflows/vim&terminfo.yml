name: Build latest terminfo database

on:
  workflow_dispatch:

jobs:
  build-terminfo:
    runs-on: ubuntu-22.04

    steps:
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y make gcc

      - name: Get latest ncurses version
        id: ncurses
        run: |
          LATEST=$(curl -s ftp://ftp.gnu.org/gnu/ncurses/ | grep -oP 'ncurses-\K[0-9]+\.[0-9]+' | sort -V | tail -n1)
          echo "version=${LATEST:-6.5}" >> $GITHUB_OUTPUT

      - name: Download ncurses source
        run: |
          wget ftp://ftp.gnu.org/gnu/ncurses/ncurses-${{ steps.ncurses.outputs.version }}.tar.gz
          tar xf ncurses-*.tar.gz
          echo "NCURSES_SRC=$PWD/ncurses-${{ steps.ncurses.outputs.version }}" >> $GITHUB_ENV

      - name: Build ncurses (native) to get tic
        run: |
          cd $NCURSES_SRC
          ./configure --prefix=$PWD/install
          make -j$(nproc)
          make install
          echo "TIC_PATH=$PWD/install/bin/tic" >> $GITHUB_ENV

      - name: Compile terminfo database
        run: |
          mkdir -p $GITHUB_WORKSPACE/terminfo-db
          $TIC_PATH -o $GITHUB_WORKSPACE/terminfo-db $NCURSES_SRC/misc/terminfo.src

      - name: Package terminfo database
        run: |
          cd $GITHUB_WORKSPACE/terminfo-db
          tar -czf $GITHUB_WORKSPACE/terminfo-latest.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminfo-latest
          path: terminfo-latest.tar.gz
